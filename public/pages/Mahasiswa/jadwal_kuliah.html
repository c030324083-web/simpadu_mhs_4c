<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Perkuliahan</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/sidebar.css">
    
    <script>
        tailwind.config = {
            corePlugins: { preflight: false },
            theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] } } }
        }
    </script>
    
    <style>
        .animate-fade-in {
            animation: fadeIn 0.3s ease-in-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container-layout {
            display: flex;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
        }
    </style>
</head>

<body 
    data-page="jadwal"
    data-role="mhs"
    data-page-title="Jadwal Perkuliahan"
    data-greeting="Semua Jadwal Perkuliahan Semester"
    data-search="false"
    class="bg-[#fdfdfd] font-sans m-0 p-0 text-slate-800 antialiased">

    <div class="container-layout">
        
        <div id="sidebar"></div>

        <div class="main flex-1 w-full p-6 md:p-8 overflow-y-auto">
            
            <div id="header"></div>

            <div class="mt-6 w-full max-w-7xl mx-auto animate-fade-in">
                <div class="bg-white border border-gray-200 rounded-2xl shadow-[0_2px_12px_-4px_rgba(0,0,0,0.05)] p-6 md:p-8">
                    
                    <h2 id="js-mhs-semester-title" class="text-lg font-bold text-gray-900 mb-6">Daftar Jadwal Kuliah Kelas</h2>
                    
                    <div class="overflow-x-auto w-full">
                        <div class="min-w-[800px] border border-solid border-gray-200 rounded-xl overflow-hidden">
                            <table class="w-full text-center text-sm border-separate border-spacing-0">
                                <thead class="bg-[#fafafa]">
                                    <tr class="text-gray-700 font-semibold">
                                        <th class="p-4 border-b border-r border-solid border-gray-200 w-36 whitespace-nowrap">Jam</th>
                                        <th class="p-4 border-b border-r border-solid border-gray-200 w-[16%]">Senin</th>
                                        <th class="p-4 border-b border-r border-solid border-gray-200 w-[16%]">Selasa</th>
                                        <th class="p-4 border-b border-r border-solid border-gray-200 w-[16%]">Rabu</th>
                                        <th class="p-4 border-b border-r border-solid border-gray-200 w-[16%]">Kamis</th>
                                        <th class="p-4 border-b border-solid border-gray-200 w-[16%]">Jumat</th>
                                    </tr>
                                </thead>
                                <tbody id="js-jadwal-tbody" class="text-gray-800">
                                    <tr>
                                        <td class="p-4 border-b border-r border-solid border-gray-200 text-gray-500 font-medium whitespace-nowrap">08.00 - 09.40</td>
                                        <td class="p-2.5 border-b border-r border-solid border-gray-200 align-top">
                                            <div class="bg-blue-100 text-blue-900 p-3.5 rounded-xl text-left h-full">
                                                <div class="font-bold mb-1.5 leading-tight">PPLBO</div>
                                                <div class="text-[13px] opacity-80">H-203</div>
                                            </div>
                                        </td>
                                        <td class="p-2.5 border-b border-r border-solid border-gray-200"></td>
                                        <td class="p-2.5 border-b border-r border-solid border-gray-200"></td>
                                        <td class="p-2.5 border-b border-r border-solid border-gray-200"></td>
                                        <td class="p-2.5 border-b border-solid border-gray-200"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../js/sidebar.js"></script>
    <script src="../../js/header.js"></script>
    <script src="../../js/logout.js"></script>
    <script src="../../js/jadwal_kuliah.js"></script>
    
</body>
</html>
