<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Mahasiswa</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/data_mhs.css">

    <script>
        tailwind.config = {
            corePlugins: { preflight: false }
        }
    </script>

    <style>
    .animate-fade-in {
        opacity: 0; 
        animation: fadeIn 0.3s ease-in-out forwards;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Memastikan sidebar selalu berada di atas efek dimming modal */
    #sidebar {
        position: relative;
        z-index: 1000 !important; 
    }
    </style>
</head>

<body class="page-data bg-[#fdfdfd] font-sans m-0 p-0 text-slate-800 antialiased" 
    data-page="mahasiswa" 
    data-role="admin"
    data-page-title="Data Mahasiswa"
    data-search="false"
    data-greeting="Kelola Data Mahasiswa">

    <div class="container">
        
        <div id="sidebar"></div>

        <div class="main animate-fade-in">

            <div id="header"></div>

            <div class="top-bar mb-6">
                <div class="flex flex-row items-center justify-start gap-4 w-full">
                    
                    <button type="button" class="btn-add flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors cursor-pointer m-0 border-none outline-none" onclick="openModal()">
                        <i data-lucide="plus" class="w-5 h-5"></i>
                        Tambah Mahasiswa
                    </button>

                    <div class="filters m-0">
                        <div class="hidden">/* [BE-NOTE]: Data dropdown menggunakan dummy. */</div>
                        <select id="filterProdi" class="border border-slate-300 rounded-lg px-4 py-2 bg-white text-slate-700 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 cursor-pointer m-0">
                            <option value="semua">Semua Program Studi</option>
                            <option value="D3 Teknik Informatika">D3 Teknik Informatika</option>
                            <option value="D4 Animasi">D4 Animasi</option>
                            <option value="D3 Akuntansi">D3 Akuntansi</option>
                        </select>
                    </div>

                </div>
            </div>

            <div class="table-box">

                <div class="flex justify-between items-center mb-4">
                    <div class="table-header">
                        <h1 class="text-xl font-semibold m-0">Daftar Mahasiswa</h1>
                    </div>

                    <div class="table-controls flex items-center gap-4">
                        <div class="sort-box flex items-center gap-2">
                            <span>Sort by</span>
                            <select id="sortSelect" class="border border-slate-300 rounded px-2 py-1 bg-white outline-none">
                                <option value="nim-asc">NIM (A-Z)</option>
                                <option value="nim-desc">NIM (Z-A)</option>
                                <option value="nama-asc">Nama Mahasiswa (A-Z)</option>
                                <option value="nama-desc">Nama Mahasiswa (Z-A)</option>
                            </select>
                        </div>

                        <div class="list-btn cursor-pointer text-slate-600 hover:text-slate-900">
                            <i data-lucide="list"></i>
                        </div>
                    </div>
                </div>

                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b-2 border-slate-200">
                            <th class="py-3 px-4 font-semibold text-sm">NIM</th>
                            <th class="py-3 px-4 font-semibold text-sm">Nama Mahasiswa</th>
                            <th class="py-3 px-4 font-semibold text-sm">Program Studi</th>
                            <th class="py-3 px-4 font-semibold text-sm">Semester</th>
                            <th class="py-3 px-4 font-semibold text-sm">Status</th>
                            <th class="py-3 px-4 font-semibold text-sm">Aksi</th>
                        </tr>
                    </thead>

                    <tbody id="tableBody">
                        </tbody>
                </table>

            </div>

        </div>

    </div>

    <div class="modal" id="modalMahasiswa" style="z-index: 50;">
        <div class="modal-content">

            <h3>Tambah Mahasiswa</h3>

            <div class="form-grid">
                <div class="form-group">
                    <label>NIM <span style="color:red">*</span></label>
                    <input type="text" id="inputNim" placeholder="Masukkan NIM">
                </div>

                <div class="form-group">
                    <label>Nama Lengkap <span style="color:red">*</span></label>
                    <input type="text" id="inputNama" placeholder="Masukkan Nama Lengkap">
                </div>

                <div class="form-group">
                    <label>Email <span style="color:red">*</span></label>
                    <input type="email" id="inputEmail" placeholder="contoh@gmail.com">
                </div>

                <div class="form-group">
                    <label>No Hp <span style="color:red">*</span></label>
                    <input type="text" id="inputHp" placeholder="08xxxxxxxxxx">
                </div>

                <div class="form-group">
                    <label>Jenis Kelamin <span style="color:red">*</span></label>
                    <select id="inputJk" class="text-slate-500">
                        <option value="">Pilih Jenis Kelamin</option>
                        <option value="Laki-laki">Laki-laki</option>
                        <option value="Perempuan">Perempuan</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Jurusan <span style="color:red">*</span></label>
                    <select id="inputJurusan" class="text-slate-500">
                        <option value="">Memuat data...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Program Studi <span style="color:red">*</span></label>
                    <select id="inputProdi" class="text-slate-500">
                        <option value="">Memuat data...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Kelas <span style="color:red">*</span></label>
                    <select id="inputKelas" class="text-slate-500">
                        <option value="">Memuat data...</option>
                    </select>
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeModal()">Batal</button>
                <button type="button" class="btn-save bg-blue-600 text-white flex gap-2 items-center px-4 py-2 rounded-lg border-none cursor-pointer hover:bg-blue-700 transition" id="btnSimpan">
                    <i data-lucide="file-text" class="w-4 h-4"></i>
                    Simpan
                </button>
            </div>
        </div>
    </div>

    <div class="modal" id="deleteModal" style="z-index: 50;">
        <div class="modal-content" style="max-width: 420px; text-align: center; padding: 2.5rem 2rem; border-radius: 1rem;">
            
            <div class="w-14 h-14 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-5">
                <i data-lucide="alert-triangle" class="w-7 h-7 text-red-500"></i>
            </div>

            <h3 class="text-[22px] font-bold text-slate-800 mb-3 m-0">Hapus Data Mahasiswa?</h3>
            
            <div class="mb-8 flex flex-col gap-1">
                <span class="block text-[14px] text-slate-500 font-normal leading-relaxed">Apakah Anda yakin ingin menghapus data ini ?</span>
                <span class="block text-[14px] text-slate-600 font-semibold leading-relaxed">Tindakan ini permanen dan tidak dapat dibatalkan.</span>
            </div>

            <div class="flex flex-col gap-3 w-full">
                <button type="button" id="btnConfirmDelete" class="w-full py-3 bg-[#DE3531] text-white font-semibold text-[15px] rounded-lg hover:bg-red-700 transition cursor-pointer border border-transparent m-0 outline-none shadow-none">
                    Ya, Hapus
                </button>
                <button type="button" onclick="closeDeleteModal()" class="w-full py-3 bg-white border border-slate-300 text-slate-600 font-semibold text-[15px] rounded-lg hover:bg-slate-50 transition cursor-pointer m-0 outline-none shadow-none">
                    Batal
                </button>
            </div>
        </div>
    </div>

    <script>
        function openModal(){
            document.getElementById("modalMahasiswa").classList.add("active");
        }

        function closeModal(){
            document.getElementById("modalMahasiswa").classList.remove("active");
        }
    </script>

    <script src="../js/sidebar.js"></script>
    <script src="../js/header.js"></script>
    <script src="../js/global_prodi_kls.js"></script>
    <script src="../js/global_filter_sort.js"></script>
    <script src="../js/data_mhs.js"></script>
    <script src="../js/logout.js"></script>

    <script>
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    </script>
</body>
</html>
