<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Mahasiswa</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/data_mhs.css">

    <script>
        tailwind.config = {
            corePlugins: { preflight: false }
        }
    </script>

    <style>
    .animate-fade-in {
        opacity: 0; 
        animation: fadeIn 0.3s ease-in-out forwards;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    #sidebar {
        position: relative;
        z-index: 1000 !important; 
    }
    </style>
</head>

<body class="page-data bg-[#fdfdfd] font-sans m-0 p-0 text-slate-800 antialiased" 
    data-page="mahasiswa" 
    data-role="admin"
    data-page-title="Data Mahasiswa"
    data-search="false"
    data-greeting="Kelola Data Mahasiswa">

    <div class="flex w-full min-h-screen">
        
        <div id="sidebar" class="shrink-0"></div>

        <div class="main animate-fade-in flex-1 min-w-0 bg-[#f8fafc] p-6">

            <div id="header" class="mb-6"></div>

            <div class="top-bar mb-6">
                <div class="flex flex-row items-center justify-start gap-4 w-full">
                    
                    <button type="button" class="btn-add flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors cursor-pointer m-0 border-none outline-none" onclick="openModal()">
                        <i data-lucide="plus" class="w-5 h-5"></i>
                        Tambah Mahasiswa
                    </button>

                    <div class="filters m-0">
                        <select id="filterProdi" class="border border-slate-300 rounded-lg px-4 py-2 bg-white text-slate-700 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 cursor-pointer m-0">
                            <option value="semua">Semua Program Studi</option>
                            <option value="1">D3 Teknik Informatika</option>
                            <option value="2">D4 Animasi</option>
                            <option value="3">D3 Akuntansi</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="table-box bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <div class="table-header">
                        <h1 class="text-xl font-semibold m-0">Daftar Mahasiswa</h1>
                    </div>
                    <div class="table-controls flex items-center gap-4">
                        <div class="search-box relative flex items-center">
                            <i data-lucide="search" class="w-4 h-4 absolute !left-3 !top-1/2 !-translate-y-1/2 text-slate-400 pointer-events-none"></i>
                            <input type="text" id="searchInput" placeholder="Cari NIM atau Nama..." 
                                class="!pl-10 !pr-4 !py-2 border border-slate-300 rounded-lg text-sm outline-none focus:border-blue-500 w-64">
                        </div>

                        <div class="sort-box flex items-center gap-2">
                            <span>Sort by</span>
                            <select id="sortSelect" class="border border-slate-300 rounded px-2 py-1 bg-white outline-none">
                                <option value="nim-asc">NIM (A-Z)</option>
                                <option value="nim-desc">NIM (Z-A)</option>
                                <option value="nama-asc">Nama Mahasiswa (A-Z)</option>
                                <option value="nama-desc">Nama Mahasiswa (Z-A)</option>
                            </select>
                        </div>
                        <div class="list-btn cursor-pointer text-slate-600 hover:text-slate-900 border border-slate-300 p-2 rounded-lg">
                            <i data-lucide="list"></i>
                        </div>
                    </div>
                </div>

                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b-2 border-slate-200">
                            <th class="py-3 px-4 font-semibold text-sm">NIM</th>
                            <th class="py-3 px-4 font-semibold text-sm">Nama Mahasiswa</th>
                            <th class="py-3 px-4 font-semibold text-sm">Program Studi</th>
                            <th class="py-3 px-4 font-semibold text-sm">Semester</th>
                            <th class="py-3 px-4 font-semibold text-sm">Status</th>
                            <th class="py-3 px-4 font-semibold text-sm">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>

                <div id="paginationContainer" class="flex justify-between items-center mt-6 pt-4 border-t border-slate-100 hidden">
                    <span id="pageInfo" class="text-sm text-slate-500">Menampilkan 0 dari 0 data</span>
                    <div id="pageButtons" class="flex items-center gap-2"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fixed inset-0 bg-black/60 hidden items-center justify-center" id="modalMahasiswa" style="z-index: 50;">
        <div class="modal-content bg-white w-[600px] max-w-[90%] p-6 rounded-2xl">
            <h3 class="text-xl font-semibold mb-4">Tambah Mahasiswa</h3>
            <div class="grid grid-cols-2 gap-4">
                <div class="form-group flex flex-col gap-1"><label class="text-sm text-slate-600">NIM <span style="color:red">*</span></label><input type="text" id="inputNim" placeholder="Masukkan NIM" class="border border-slate-300 rounded-lg p-2.5 text-sm outline-none"></div>
                <div class="form-group flex flex-col gap-1"><label class="text-sm text-slate-600">Nama Lengkap <span style="color:red">*</span></label><input type="text" id="inputNama" placeholder="Masukkan Nama Lengkap" class="border border-slate-300 rounded-lg p-2.5 text-sm outline-none"></div>
                <div class="form-group flex flex-col gap-1"><label class="text-sm text-slate-600">Email <span style="color:red">*</span></label><input type="email" id="inputEmail" placeholder="contoh@gmail.com" class="border border-slate-300 rounded-lg p-2.5 text-sm outline-none"></div>
                <div class="form-group flex flex-col gap-1"><label class="text-sm text-slate-600">No Hp <span style="color:red">*</span></label><input type="text" id="inputHp" placeholder="08xxxxxxxxxx" class="border border-slate-300 rounded-lg p-2.5 text-sm outline-none"></div>
                <div class="form-group flex flex-col gap-1"><label class="text-sm text-slate-600">Jenis Kelamin <span style="color:red">*</span></label><select id="inputJk" class="border border-slate-300 rounded-lg p-2.5 text-sm outline-none"><option value="">Pilih Jenis Kelamin</option><option value="Laki-laki">Laki-laki</option><option value="Perempuan">Perempuan</option></select></div>
                <div class="form-group flex flex-col gap-1"><label class="text-sm text-slate-600">Jurusan <span style="color:red">*</span></label><select id="inputJurusan" class="border border-slate-300 rounded-lg p-2.5 text-sm outline-none"><option value="">Memuat data...</option></select></div>
                <div class="form-group flex flex-col gap-1"><label class="text-sm text-slate-600">Program Studi <span style="color:red">*</span></label><select id="inputProdi" class="border border-slate-300 rounded-lg p-2.5 text-sm outline-none"><option value="">Memuat data...</option></select></div>
                <div class="form-group flex flex-col gap-1"><label class="text-sm text-slate-600">Kelas <span style="color:red">*</span></label><select id="inputKelas" class="border border-slate-300 rounded-lg p-2.5 text-sm outline-none"><option value="">Memuat data...</option></select></div>
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button type="button" class="bg-slate-200 text-slate-700 px-5 py-2.5 rounded-lg font-medium hover:bg-slate-300 transition" onclick="closeModal()">Batal</button>
                <button type="button" class="bg-blue-600 text-white px-5 py-2.5 rounded-lg font-medium hover:bg-blue-700 transition flex items-center gap-2" id="btnSimpan"><i data-lucide="file-text" class="w-4 h-4"></i> Simpan</button>
            </div>
        </div>
    </div>

    <div class="modal fixed inset-0 bg-black/60 hidden items-center justify-center" id="deleteModal" style="z-index: 50;">
        <div class="modal-content bg-white w-[420px] max-w-[90%] p-10 rounded-2xl text-center">
            
            <div class="w-14 h-14 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-5">
                <i data-lucide="alert-triangle" class="w-7 h-7 text-red-500"></i>
            </div>

            <h3 class="text-[22px] font-bold text-slate-800 mb-3 m-0">Hapus Data Mahasiswa?</h3>
            
            <div class="mb-8 flex flex-col gap-1">
                <span class="block text-[14px] text-slate-500 font-normal leading-relaxed">Apakah Anda yakin ingin menghapus data ini ?</span>
                <span class="block text-[14px] text-slate-600 font-semibold leading-relaxed">Tindakan ini permanen dan tidak dapat dibatalkan.</span>
            </div>

            <div class="flex flex-col gap-3 w-full">
                <button type="button" id="btnConfirmDelete" class="w-full py-3 bg-[#DE3531] text-white font-semibold text-[15px] rounded-lg hover:bg-red-700 transition cursor-pointer border border-transparent outline-none shadow-none">
                    Ya, Hapus
                </button>
                <button type="button" onclick="closeDeleteModal()" class="w-full py-3 bg-white border border-slate-300 text-slate-600 font-semibold text-[15px] rounded-lg hover:bg-slate-50 transition cursor-pointer outline-none shadow-none">
                    Batal
                </button>
            </div>
        </div>
    </div>

    <script>
        // Modal Tambah Data
        function openModal(){ 
            const m = document.getElementById("modalMahasiswa");
            m.classList.remove("hidden");
            m.classList.add("flex", "active"); // Menyertakan .active
        }
        function closeModal(){ 
            const m = document.getElementById("modalMahasiswa");
            m.classList.remove("flex", "active"); // Menghapus .active
            m.classList.add("hidden");
        }

        // Modal Hapus Data
        function openDeleteModal() { 
            const m = document.getElementById("deleteModal");
            m.classList.remove("hidden");
            m.classList.add("flex", "active"); // Menyertakan .active
        }
        function closeDeleteModal() { 
            const m = document.getElementById("deleteModal");
            m.classList.remove("flex", "active"); // Menghapus .active
            m.classList.add("hidden");
        }
    </script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/header.js"></script>
    <script src="../js/global_prodi_kls.js"></script>
    <script src="../js/global_filter_sort.js"></script>
    <script src="../js/data_mhs.js"></script>
    <script src="../js/logout.js"></script>
    <script>
        if (typeof lucide !== 'undefined') { lucide.createIcons(); }
    </script>
</body>
</html>
