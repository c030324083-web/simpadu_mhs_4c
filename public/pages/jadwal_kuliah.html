<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Kuliah - Dashboard Admin</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/sidebar.css">

    <script>
        tailwind.config = {
            corePlugins: { preflight: false },
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f8fafc; margin: 0; padding: 0; }
        .container-layout { display: flex; min-height: 100vh; width: 100%; overflow-x: hidden; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .table-kelas th { font-size: 13px; font-weight: 600; color: #475569; background-color: #f8fafc; text-align: left; padding: 16px; }
        .table-kelas td { font-size: 13px; font-weight: 400; color: #334155; border-bottom: 1px solid #f1f5f9; padding: 16px; }
        .table-kelas tr:last-child td { border-bottom: none; }
        .clickable-row { cursor: pointer; transition: background-color 0.2s; }
        .clickable-row:hover { background-color: #f1f5f9; }
        [data-lucide="search"], .lucide-search { display: none !important; }
        .table-jadwal th, .table-jadwal td { border: 2px solid #F1F5F9; }
    </style>
</head>
<body 
    data-page="jadwal"
    data-role="admin"
    data-page-title="Jadwal Kuliah"
    data-greeting="Jadwal Kuliah Mahasiswa Per Kelas"
    class="bg-[#F8FAFC] font-sans m-0 p-0 text-slate-800 antialiased font-normal">

    <div class="container-layout">
        
        <div id="sidebar" class="flex-shrink-0 md:sticky md:top-0 h-screen z-20"></div>

        <div class="main flex-1 w-full p-6 md:p-8 overflow-y-auto">

            <div id="header"></div>

            <div class="mt-6 w-full max-w-7xl mx-auto content-body relative">
                
                <div id="js-view-daftar-kelas" class="view-section block animate-fade-in">
                    
                    <div class="bg-white rounded-xl border border-gray-200 p-4 mb-6 flex flex-wrap items-end gap-4 shadow-sm">
                        <div class="flex flex-col gap-1.5">
                            <label class="text-[12px] text-gray-400 font-medium">Program Studi</label>
                            <div class="relative">
                                <select id="js-filter-prodi" class="appearance-none bg-white border border-gray-200 text-gray-600 py-2 px-4 pr-10 rounded-lg text-[13px] focus:outline-none w-[200px] cursor-pointer">
                                    <option value="semua">Semua Program Studi</option>
                                    <option value="D3 Teknik Informatika">D3 Teknik Informatika</option>
                                    <option value="D4 Animasi">D4 Animasi</option>
                                    <option value="D3 Akuntansi">D3 Akuntansi</option>
                                </select>
                                 <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400 absolute right-3 top-2.5 pointer-events-none"></i>
                            </div>
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <label class="text-[12px] text-gray-400 font-medium">Kelas</label>
                            <div class="relative">
                                <select id="js-filter-kelas" class="appearance-none bg-white border border-gray-200 text-gray-600 py-2 px-4 pr-10 rounded-lg text-[13px] focus:outline-none w-[160px] cursor-pointer">
                                    <option value="semua">Semua Kelas</option>
                                </select>
                                <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400 absolute right-3 top-2.5 pointer-events-none"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden pb-4">
                        <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-white">
                            <h2 class="text-[15px] font-semibold text-gray-800 m-0">Daftar Jadwal Kuliah Berdasarkan Kelas</h2>
                            <div class="flex items-center gap-3">
                                <span class="text-[13px] text-gray-500">Sort by</span>
                                <div class="relative">
                                    <select id="js-sort-by" class="appearance-none bg-white border border-gray-300 text-gray-700 py-1.5 px-4 pr-8 rounded-lg text-[13px] focus:outline-none w-[140px] cursor-pointer">
                                        <option value="id-asc">ID (A-Z)</option>
                                        <option value="id-desc">ID (Z-A)</option>
                                        <option value="kelas-asc">Kelas (A-Z)</option>
                                        <option value="kelas-desc">Kelas (Z-A)</option>
                                    </select>
                                    <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400 absolute right-3 top-2.5 pointer-events-none"></i>
                                </div>
                                <button id="js-btn-view-list" class="w-[34px] h-[34px] bg-white border border-gray-300 rounded-lg flex items-center justify-center hover:bg-gray-50 text-gray-600 cursor-pointer">
                                    <i data-lucide="list" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                        <div class="w-full overflow-x-auto">
                            <table class="w-full min-w-[700px] border-collapse table-kelas">
                                <thead>
                                    <tr>
                                        <th class="w-[15%]">ID</th>
                                        <th class="w-[20%]">KELAS</th>
                                        <th class="w-[45%]">Program Studi</th>
                                        <th class="w-[20%]">Mahasiswa</th>
                                    </tr>
                                </thead>
                                <tbody id="js-table-kelas-tbody">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div id="js-view-jadwal" class="view-section hidden animate-fade-in">
                    <button id="js-btn-back" class="flex items-center gap-1.5 !text-blue-600 text-[14px] font-medium bg-transparent border-none cursor-pointer hover:underline mb-6 px-0 w-fit">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali ke Daftar Kelas
                    </button>
                    <div class="bg-white border border-gray-200 rounded-2xl shadow-[0_2px_12px_-4px_rgba(0,0,0,0.05)] p-6 md:p-8">
                        <h2 id="js-jadwal-title" class="text-lg font-bold text-gray-900 mb-6">Daftar Jadwal Kuliah</h2>
                        <div class="overflow-x-auto w-full">
                            <div class="min-w-[800px] border border-solid border-gray-200 rounded-xl overflow-hidden">
                                <table class="w-full text-center text-sm border-separate border-spacing-0 table-jadwal">
                                    <thead class="bg-[#fafafa]">
                                        <tr class="text-gray-700 font-semibold">
                                            <th class="p-4 border-b border-r border-solid border-gray-200 w-36 whitespace-nowrap">Jam</th>
                                            <th class="p-4 border-b border-r border-solid border-gray-200 w-[16%]">Senin</th>
                                            <th class="p-4 border-b border-r border-solid border-gray-200 w-[16%]">Selasa</th>
                                            <th class="p-4 border-b border-r border-solid border-gray-200 w-[16%]">Rabu</th>
                                            <th class="p-4 border-b border-r border-solid border-gray-200 w-[16%]">Kamis</th>
                                            <th class="p-4 border-b border-solid border-gray-200 w-[16%]">Jumat</th>
                                        </tr>
                                    </thead>
                                    <tbody id="js-jadwal-tbody" class="text-gray-800">
                                        <tr>
                                            <td class="p-4 border-b border-r border-solid border-gray-200 text-gray-500 font-medium whitespace-nowrap">08.00 - 09.40</td>
                                            <td class="p-2.5 border-b border-r border-solid border-gray-200 align-top">
                                                <div class="bg-blue-100 text-blue-900 p-3.5 rounded-xl text-left h-full">
                                                    <div class="font-bold mb-1.5 leading-tight">Nama Mata Kuliah</div>
                                                    <div class="text-[13px] opacity-80">Ruangan</div>
                                                </div>
                                            </td>
                                            <td class="p-2.5 border-b border-r border-solid border-gray-200"></td>
                                            <td class="p-2.5 border-b border-r border-solid border-gray-200"></td>
                                            <td class="p-2.5 border-b border-r border-solid border-gray-200"></td>
                                            <td class="p-2.5 border-b border-solid border-gray-200"></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
    </div>

    <script src="../../js/sidebar.js"></script>
    <script src="../../js/header.js"></script>
    <script src="../js/logout.js"></script>
    <script src="../../js/global_prodi_kelas.js"></script>
    <script src="../../js/global_filter_sort.js"></script>
    <script src="../../js/jadwal_kuliah.js"></script>
</body>
</html>
